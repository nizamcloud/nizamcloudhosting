<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OxyX Store - Minecraft Services</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>OxyX <span>Minecraft Store</span></h1>
        <p>Server Hosting, Plugin, & Tools Tanpa Batas</p>
    </header>

    <div class="container">
        <div class="product-grid" id="product-container">
            </div>
    </div>

    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <h2>🛒 Keranjang Belanja</h2>
            <div id="cart-items"></div>
            <hr>
            <p>Total: <strong id="cart-total">Rp 0</strong></p>
            <button class="btn-primary" onclick="checkout()">Lanjut Pembayaran</button>
            <button class="btn-secondary" onclick="toggleCart()">Tutup</button>
        </div>
    </div>

    <div id="payment-modal" class="modal">
        <div class="modal-content" style="text-align: center;">
            <h2 style="color: #00d1ff;">Metode Pembayaran</h2>
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/86/Gopay_logo.svg" width="120" alt="GoPay">
            <div style="background: #222; padding: 15px; border-radius: 8px; margin: 15px 0; border: 1px dashed var(--primary-color);">
                <p>Silakan transfer ke nomor GoPay:</p>
                <h3 style="color: #39ff14; font-size: 1.5rem;">6283862601567</h3>
                <p>A/N: OXYX STORE</p>
            </div>
            <p style="font-size: 0.9rem;">Klik tombol di bawah setelah transfer untuk konfirmasi otomatis.</p>
            <button id="wa-confirm-btn" class="btn-wa">Konfirmasi via WhatsApp</button>
            <button class="btn-secondary" onclick="closePayment()">Batal</button>
        </div>
    </div>

    <button class="cart-btn" onclick="toggleCart()">🛒</button>

    <script src="script.js"></script>
</body>
</html>
